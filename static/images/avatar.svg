<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 背景 -->
  <rect width="200" height="200" fill="#FDFCF7"/>
  
  <!-- 3D 像素小狗 -->
  <g transform="translate(50, 40)">
    <!-- 耳朵左 -->
    <rect x="10" y="25" width="20" height="35" rx="3" fill="#8B7355"/>
    <rect x="12" y="27" width="16" height="31" rx="2" fill="#A0826D"/>
    
    <!-- 耳朵右 -->
    <rect x="70" y="25" width="20" height="35" rx="3" fill="#8B7355"/>
    <rect x="72" y="27" width="16" height="31" rx="2" fill="#A0826D"/>
    
    <!-- 头部阴影/立体效果 -->
    <rect x="23" y="23" width="54" height="54" rx="12" fill="#8B7355"/>
    
    <!-- 头部主体 -->
    <rect x="20" y="20" width="60" height="60" rx="12" fill="#C4A882"/>
    
    <!-- 脸部浅色区域 -->
    <rect x="30" y="50" width="40" height="25" rx="8" fill="#E8D4C4"/>
    
    <!-- 眼睛左 -->
    <circle cx="38" cy="45" r="6" fill="#3D3D3D"/>
    <circle cx="40" cy="43" r="2" fill="white"/>
    
    <!-- 眼睛右 -->
    <circle cx="72" cy="45" r="6" fill="#3D3D3D"/>
    <circle cx="74" cy="43" r="2" fill="white"/>
    
    <!-- 鼻子 -->
    <ellipse cx="55" cy="58" rx="8" ry="6" fill="#3D3D3D"/>
    
    <!-- 嘴巴 -->
    <path d="M 48 68 Q 55 72 62 68" stroke="#3D3D3D" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- 腮红左 -->
    <ellipse cx="32" cy="62" rx="5" ry="3" fill="#FFB4A2" opacity="0.6"/>
    
    <!-- 腮红右 -->
    <ellipse cx="78" cy="62" rx="5" ry="3" fill="#FFB4A2" opacity="0.6"/>
    
    <!-- 身体 -->
    <rect x="25" y="75" width="60" height="50" rx="15" fill="#C4A882"/>
    <rect x="30" y="80" width="50" height="35" rx="10" fill="#E8D4C4"/>
    
    <!-- 前腿左 -->
    <rect x="30" y="110" width="18" height="30" rx="5" fill="#C4A882"/>
    <rect x="33" y="115" width="12" height="22" rx="3" fill="#E8D4C4"/>
    
    <!-- 前腿右 -->
    <rect x="62" y="110" width="18" height="30" rx="5" fill="#C4A882"/>
    <rect x="65" y="115" width="12" height="22" rx="3" fill="#E8D4C4"/>
    
    <!-- 尾巴 -->
    <ellipse cx="90" cy="90" rx="8" ry="15" fill="#C4A882" transform="rotate(-20 90 90)"/>
    <ellipse cx="92" cy="88" rx="4" ry="8" fill="#E8D4C4" transform="rotate(-20 92 88)"/>
    
    <!-- 项圈 -->
    <rect x="25" y="72" width="60" height="8" rx="2" fill="#FF9A8B"/>
    <circle cx="55" cy="80" r="5" fill="#FFD700"/>
  </g>
  
  <!-- 装饰圆点 -->
  <circle cx="30" cy="35" r="8" fill="#FF9A8B" opacity="0.3"/>
  <circle cx="170" cy="50" r="6" fill="#A8D4E6" opacity="0.3"/>
  <circle cx="25" cy="160" r="5" fill="#FFE4A1" opacity="0.3"/>
  <circle cx="175" cy="150" r="7" fill="#D4C5E8" opacity="0.3"/>
</svg>
