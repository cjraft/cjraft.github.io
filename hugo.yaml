baseURL: "https://cjraft.github.io/"
languageCode: "zh-CN"
title: "CJ's Blog"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

defaultContentLanguage: zh
hasCJKLanguage: true

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 20

params:
  env: production
  title: "CJ's Blog"
  description: "关于 AI 的技术、资讯与思考。AI 动的是认知本身，值得认真对待。"
  keywords: [AI, 人工智能, ChatGPT, Claude, Prompt, LLM, RAG, Agent, MCP]
  author: cjraft
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    favicon: "/favicon-32x32.png"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    appleTouchIcon: "/apple-touch-icon.png"

  # 首页模式：profile（个人介绍）
  homeInfoParams:
    Content: |
      嗨，我是 CJ 👋

      ---

      "我更感兴趣的不是 AI 能做什么，而是它让我们重新看见了什么。"

      ---

      当一个模型给出一个很好的答案，那是推理，还是记忆？当一个产品让人"感动"，那是设计，还是运气？我不知道，但我想带着这些问题把沿途看到的东西写下来。

      ---

      关于 AI 的边界在哪，关于认知是怎么被重塑的，偶尔也聊聊那些让我觉得「啊，原来如此」的瞬间。

  socialIcons:
    - name: github
      url: "https://github.com/cjraft"
    - name: rss
      url: "/index.xml"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 1
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: articles
      name: "文章"
      url: /articles/
      weight: 20
    - identifier: news
      name: "每日资讯"
      url: /news/
      weight: 30
    - identifier: tags
      name: "标签"
      url: /tags/
      weight: 40
    - identifier: archives
      name: "归档"
      url: /archives/
      weight: 50
    - identifier: search
      name: "搜索"
      url: /search/
      weight: 60
    - identifier: about
      name: "关于"
      url: /about/
      weight: 70

outputs:
  home:
    - HTML
    - RSS
    - JSON # 搜索功能需要

markup:
  goldmark:
    renderer:
      unsafe: true # 允许 HTML
  highlight:
    noClasses: true
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    # lineNos: true
    style: emacs
