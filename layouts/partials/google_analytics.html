{{- $ga4 := site.Params.analytics.ga4 -}}
{{- with $ga4.measurementId }}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];

  function gtag() {
    dataLayer.push(arguments);
  }

  gtag('js', new Date());
  gtag('config', '{{ . }}');

  window.cjAnalytics = {
    track: function(eventName, params) {
      if (typeof gtag !== 'function') {
        return;
      }

      gtag('event', eventName, params || {});
    }
  };

  document.addEventListener('click', function(event) {
    var trackedElement = event.target.closest('[data-analytics-event]');

    if (trackedElement) {
      var eventName = trackedElement.dataset.analyticsEvent;
      var eventParams = {};

      Object.keys(trackedElement.dataset).forEach(function(key) {
        if (!key.startsWith('analytics') || key === 'analyticsEvent') {
          return;
        }

        var paramName = key
          .slice('analytics'.length)
          .replace(/^[A-Z]/, function(match) { return match.toLowerCase(); })
          .replace(/[A-Z]/g, function(match) { return '_' + match.toLowerCase(); });

        eventParams[paramName] = trackedElement.dataset[key];
      });

      window.cjAnalytics.track(eventName, eventParams);
      return;
    }

    var link = event.target.closest('.post-content a[href], .social-icons a[href]');

    if (!link) {
      return;
    }

    try {
      var url = new URL(link.href, window.location.href);

      if (url.origin === window.location.origin) {
        return;
      }

      window.cjAnalytics.track('outbound_click', {
        link_url: url.href,
        link_domain: url.hostname,
        link_text: (link.textContent || '').trim().slice(0, 120)
      });
    } catch (error) {
      // Ignore malformed URLs and allow navigation to continue.
    }
  });
</script>
{{- end }}
