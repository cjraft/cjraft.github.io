<div class="social-icons" {{ with .align}}align="{{.}}" {{- end }}>
    {{- range site.Params.socialIcons }}
    <a
        href="{{ trim .url " " | safeURL }}"
        target="_blank"
        rel="noopener noreferrer me"
        title="{{ (.title | default .name) | title }}"
        {{- if eq .name "rss" }}
        data-analytics-event="rss_click"
        data-analytics-rss-source="social_icon"
        data-analytics-rss-url="{{ trim .url " " | safeURL }}"
        {{- end }}>
        {{ partial "svg.html" . }}
    </a>
    {{- end }}
</div>
